<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Responsive Image Gallery</h1>

<div class="buttons">
    <button onclick="filterSelection('all')">All</button>
    <button onclick="filterSelection('nature')">Nature</button>
    <button onclick="filterSelection('city')">City</button>
    <button onclick="filterSelection('animals')">Animals</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="images/1pic.webp" onclick="openLightbox(0)">
    </div>

    <div class="image city">
        <img src="images/2pic.webp" onclick="openLightbox(1)">
    </div>

    <div class="image animals">
        <img src="images/3pic.webp" onclick="openLightbox(2)">
    </div>

    <div class="image nature">
        <img src="images/4pic.webp" onclick="openLightbox(3)">
    </div>

    <div class="image city">
        <img src="images/5pic.webp" onclick="openLightbox(4)">
    </div>

    <div class="image animals">
        <img src="images/6pic.webp" onclick="openLightbox(5)">
    </div>

</div>

<div id="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>

    <button class="prev" onclick="changeImage(-1)">❮</button>

    <img id="lightbox-img">

    <button class="next" onclick="changeImage(1)">❯</button>
</div>

<script src="script.js"></script>

</body>
</html>
